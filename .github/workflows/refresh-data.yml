name: רענון נתונים יומי

on:
  schedule:
    - cron: '0 2 * * *'   # 05:00 שעון ישראל בקיץ
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: משיכה ועיבוד (כישלון רך — נשארים עם הנתונים הקיימים)
        run: |
          mkdir -p raw && cd raw
          if node ../scripts/fetch-osm.mjs && node ../scripts/fetch-plans.mjs; then
            node ../scripts/process.mjs
            node ../scripts/process2.mjs
            cp data.js data2.js ../data/
            echo "נתונים חדשים עובדו בהצלחה"
          else
            echo "::warning::שליפת הנתונים נכשלה הלילה — האתר נשאר עם הנתונים הקיימים"
          fi
          cd ..
          node scripts/fetch-businesses.mjs || echo "::warning::רענון העסקים נכשל — נשארים עם הרשימה הקיימת"

      - name: בניית האתר
        run: |
          cd src
          node build.mjs

      - name: קומיט אם השתנה
        run: |
          git config user.name "map-refresh-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- data/ index.html dist-artifact.html admin.html; then
            git add data/data.js data/data2.js data/biz.js index.html dist-artifact.html admin.html
            git commit -m "🔄 רענון נתונים יומי ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "אין שינוי בנתונים"
          fi
