name: רענון אירועי העירייה

on:
  schedule:
    - cron: '15 */3 * * *'   # כל 3 שעות
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  events:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: משיכת אירועים מאתר העירייה
        run: node scripts/fetch-muni-events.mjs

      - name: קומיט אם השתנה
        run: |
          git config user.name "events-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- data/muni-events.json; then
            git add data/muni-events.json
            git commit -m "📅 עדכון אירועי העירייה ($(date -u +%Y-%m-%dT%H:%M))"
            git push
          else
            echo "אין אירועים חדשים"
          fi
